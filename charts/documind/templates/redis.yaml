apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ include "documind.namespace" . }}
spec:
  selector:
    app: redis
  ports:
    - port: {{ .Values.service.redisPort }}
      targetPort: {{ .Values.service.redisPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ include "documind.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.images.redis }}
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: {{ .Values.service.redisPort }}
