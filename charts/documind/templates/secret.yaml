apiVersion: v1
kind: Secret
metadata:
  name: documind-secrets
  namespace: {{ include "documind.namespace" . }}
type: Opaque
stringData:
  DOCUMIND_ADMIN_API_KEY: {{ .Values.secrets.adminApiKey | quote }}
  DOCUMIND_JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  DOCUMIND_GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  DOCUMIND_GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  DOCUMIND_GOOGLE_REDIRECT_URI: {{ .Values.secrets.googleRedirectUri | quote }}
