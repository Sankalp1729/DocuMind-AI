apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: {{ include "documind.namespace" . }}
spec:
  selector:
    app: qdrant
  ports:
    - port: {{ .Values.service.qdrantPort }}
      targetPort: {{ .Values.service.qdrantPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: {{ include "documind.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: {{ .Values.images.qdrant }}
          ports:
            - containerPort: {{ .Values.service.qdrantPort }}
          volumeMounts:
            - name: storage
              mountPath: /qdrant/storage
      volumes:
        - name: storage
          emptyDir: {}
