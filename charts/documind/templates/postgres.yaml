apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ include "documind.namespace" . }}
spec:
  selector:
    app: postgres
  ports:
    - port: {{ .Values.service.postgresPort }}
      targetPort: {{ .Values.service.postgresPort }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: {{ include "documind.namespace" . }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.images.postgres }}
          ports:
            - containerPort: {{ .Values.service.postgresPort }}
          env:
            - name: POSTGRES_DB
              value: documind
            - name: POSTGRES_USER
              value: documind
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: documind-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.storage.postgres }}
