apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ include "documind.namespace" . }}
spec:
  selector:
    app: backend
  ports:
    - port: {{ .Values.service.backendPort }}
      targetPort: {{ .Values.service.backendPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ include "documind.namespace" . }}
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.images.backend }}
          ports:
            - containerPort: {{ .Values.service.backendPort }}
          envFrom:
            - configMapRef:
                name: documind-config
            - secretRef:
                name: documind-secrets
          env:
            - name: DOCUMIND_OLLAMA_BASE_URL
              value: http://ollama:{{ .Values.service.ollamaPort }}
            - name: PYTHONPATH
              value: /app
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.backendPort }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.backendPort }}
