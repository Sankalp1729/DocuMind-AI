apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 8501
      targetPort: 8501
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/documind-ai/documind-frontend:latest
          ports:
            - containerPort: 8501
          env:
            - name: DOCUMIND_API_BASE_URL
              value: http://backend:8000
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
